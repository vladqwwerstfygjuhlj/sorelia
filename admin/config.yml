collections:
  - name: "catalog"
    label: "Каталог"
    files:
      - label: "Всі товари"
        name: "products"
        file: "products.json"
        description: "Список усіх прикрас"
        fields:
          - name: "items"
            label: "Товари"
            widget: "list"
            summary: '{{fields.name}} - {{fields.price}} грн'
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Назва", name: "name", widget: "string" }
              - { label: "Ціна", name: "price", widget: "number" }
              - { label: "Категорія", name: "category", widget: "string" }
              - { label: "Зображення", name: "image", widget: "image" }
              - { label: "Опис (mood)", name: "mood", widget: "text" }