backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "catalog"
    label: "Каталог"
    files:
      - label: "Всі товари"
        name: "products"
        file: "products.json"
        format: "json"
        fields:
          - name: "items" # Ця назва для адмінки, вона "оберне" ваш масив
            label: "Товари"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Назва", name: "name", widget: "string" }
              - { label: "Ціна", name: "price", widget: "number" }
              - { label: "Категорія", name: "category", widget: "string" }
              - { label: "Зображення", name: "image", widget: "image" }
              - { label: "Опис (mood)", name: "mood", widget: "text" }